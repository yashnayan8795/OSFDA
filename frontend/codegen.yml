schema: ${NEXT_PUBLIC_GRAPHQL_URL:http://localhost:8000/graphql}
documents: "lib/graphql/**/*.graphql"
generates:
  lib/graphql/generated.ts:
    preset: client
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true
      scalars:
        DateTime: Date
