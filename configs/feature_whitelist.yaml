# Feature Whitelist — Leakage Gate
# =================================
# Every feature must have a written justification.
# No feature enters a model without passing this gate.
version: "1.0.0"

# Problem A: Severity Triage (pre-circumstance ONLY)
problem_a_whitelist:
  - feature: "Time_Date"
    justification: "Known before flight — derive month, year, time-of-day"
    action: "derive"
  - feature: "Time.1_Local Time Of Day"
    justification: "Observable pre-flight"
    action: "include"
  - feature: "Place_Locale Reference"
    justification: "Airport/location, known pre-flight"
    action: "include"
  - feature: "Place.1_State Reference"
    justification: "State, known pre-flight"
    action: "include"
  - feature: "Environment_Flight Conditions"
    justification: "VMC/IMC, known from weather brief"
    action: "include"
  - feature: "Environment.1_Weather Elements / Visibility"
    justification: "Weather brief data"
    action: "include"
  - feature: "Environment.2_Work Environment Factor"
    justification: "Operational context"
    action: "include"
  - feature: "Environment.3_Light"
    justification: "Time-dependent, known pre-flight"
    action: "include"
  - feature: "Environment.4_Ceiling"
    justification: "Weather data"
    action: "include"
  - feature: "Environment.5_RVR.Single Value"
    justification: "Runway visual range from ATIS"
    action: "include"
  - feature: "Aircraft 1_Make"
    justification: "Aircraft registration data"
    action: "include"
  - feature: "Aircraft 1.1_Model"
    justification: "Aircraft registration data"
    action: "include"
  - feature: "Aircraft 1.2_Operator"
    justification: "Known pre-flight"
    action: "include"
  - feature: "Aircraft 1.5_Operating Under FAR Part"
    justification: "Regulatory context"
    action: "include"
  - feature: "Aircraft 1.6_Flight Plan"
    justification: "Filed pre-flight"
    action: "include"
  - feature: "Aircraft 1.7_Mission"
    justification: "Planned pre-flight"
    action: "include"
  - feature: "Aircraft 1.8_Flight Phase"
    justification: "Known at filing time — use with caution"
    action: "include"
  - feature: "Aircraft 1.14_Number of Seats"
    justification: "Aircraft specification"
    action: "include"
  - feature: "Aircraft 1.15_Crew Size"
    justification: "Planned pre-flight"
    action: "include"
  - feature: "Person 1.3_Function"
    justification: "Crew role, known pre-flight"
    action: "include"
  - feature: "Person 1.4_Qualification"
    justification: "Known pre-flight"
    action: "include"
  - feature: "Person 1.5_Experience"
    justification: "Known pre-flight, bucket into ordinal bands"
    action: "derive"

# Problem B extras: retrospective features allowed AFTER incident
problem_b_extra:
  - feature: "Events_Anomaly"
    justification: "Post-incident observation — allowed for retrospective categorization"
    action: "include"
  - feature: "Events.3_Detector"
    justification: "Post-incident — who detected"
    action: "include"
  - feature: "Events.4_When Detected"
    justification: "Post-incident — when detected"
    action: "include"
  - feature: "Report 1_Narrative"
    justification: "Post-incident text — text tower input"
    action: "text_tower"
  - feature: "Report 2_Narrative"
    justification: "Post-incident text — text tower input"
    action: "text_tower"
  - feature: "Report 1.2_Synopsis"
    justification: "Post-incident synopsis — text tower input"
    action: "text_tower"

# Explicitly excluded columns (for documentation)
excluded:
  - feature: "Events.5_Result"
    reason: "TARGET SOURCE for severity"
  - feature: "Assessments.1_Primary Problem"
    reason: "TARGET SOURCE for category"
  - feature: "Assessments_Contributing Factors / Situations"
    reason: "Too closely aligned with category target"
  - feature: "Events.1_Miss Distance"
    reason: "Used in severity target construction"
  - feature: "Events.2_Were Passengers Involved In Event"
    reason: "Used in severity target construction"
  - feature: "Component.3_Problem"
    reason: "Used in severity target construction"
